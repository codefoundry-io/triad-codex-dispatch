# Legacy opt-in profile only: optional personal-machine
# /etc/codex/requirements.toml remediation. Ordinary 0.2.529 installs use plain
# `codex`, do not install the triad profile, and do not need this file.
#
# The runtime profile generated only when
# TRIAD_BOOTSTRAP_INSTALL_CODEX_PROFILE=1 denies writes to its own wrapper,
# Python, and provider executable paths. A trusted project's
# legacy sandbox_mode setting can select the older sandbox path instead of that
# permission profile. This optional root-owned file pins triad_leader selection
# on one personal machine so a project cannot opt back into the legacy path.
# See https://learn.chatgpt.com/docs/permissions.
#
# The machine-specific [permissions.triad_leader] body remains in
# $CODEX_HOME/triad-codex-dispatch.config.toml. Install this optional selection
# file only after bootstrap has provisioned that profile for the local account.
# It requires Codex >= 0.138.0 and permission to create
# /etc/codex/requirements.toml. Bootstrap remains unprivileged: it never writes
# this file.
#
# From any unrelated working directory, print a no-clobber Python copy command
# from the currently installed plugin path. It uses only Python's standard
# library and embeds the source as an absolute argv item:
#   python3 -c 'import json,pathlib,shlex,subprocess; result=subprocess.run(["codex", "plugin", "list", "--json"],check=True,capture_output=True,text=True); data=json.loads(result.stdout); item=next(item for item in data["installed"] if item["pluginId"]=="triad-codex-dispatch@triad-codex-dispatch"); root=pathlib.Path(item["source"]["path"]); assert root.is_absolute(); source=root / "migration" / "requirements.recommended.toml"; copier="from pathlib import Path\nimport shutil, sys\nsource, destination = map(Path, sys.argv[1:])\ndestination.parent.mkdir(parents=True, exist_ok=True)\nwith source.open(\"rb\") as source_handle, destination.open(\"xb\") as destination_handle:\n    shutil.copyfileobj(source_handle, destination_handle)"; print(shlex.join(["python3", "-c", copier, str(source), "/etc/codex/requirements.toml"]))'
# Run the printed command in a terminal that can create the destination. Do not
# overwrite an existing /etc/codex/requirements.toml; it may carry unrelated
# local constraints. The command exits without replacing an existing file. If
# it exists, merge the two keys below by hand: set default_permissions =
# "triad_leader" by updating the existing key in place (a duplicate key is
# invalid TOML), and ensure the [allowed_permission_profiles] table lists
# triad_leader = true (add the table if absent, else add the key to the existing
# table). If that table already allows OTHER profiles, decide deliberately
# whether triad_leader should be the SOLE allowed profile -- merely adding
# triad_leader = true does not remove the others. Preserve every unrelated key
# already in the file.
#
# Non-root partial mitigation (does not require this file or root): a user
# can add, to their OWN ~/.codex/config.toml, for one specific sensitive
# project path:
#   [projects."/absolute/path/to/sensitive-project"]
#   trust_level = "untrusted"
# which stops that project's own .codex/ config layer (including any legacy
# sandbox_mode key it might set) from loading at all.
#
# --- Env-boundary hardening (recommended; user or machine config.toml) ---
# Separate from the sandbox_mode residual above. Older releases described the
# launchers as allow-listed; current exact launchers use `prompt` rules for
# approval-reviewed execution OUTSIDE the sandbox. Their inherited ENVIRONMENT
# is a trust boundary: a loader/runtime var (LD_PRELOAD, DYLD_INSERT_LIBRARIES,
# NODE_OPTIONS for the Node vendors, PYTHONPATH, ...) can run workspace code in
# an outside-sandbox process. The launcher already CONSTRUCTS a clean env
# (dropping those vars + pinning PATH) as always-on defense-in-depth, but the
# NATIVE and more complete close is Codex's own shell_environment_policy: it
# filters env vars before Codex spawns ANY command, INCLUDING the launcher --
# which also neutralizes an LD_PRELOAD aimed at the launcher's OWN process,
# something no launcher-side code can catch (the linker honors it at exec,
# before any launcher line). Add to ~/.codex/config.toml (per-user) or a
# machine-wide config layer:
#   [shell_environment_policy]
#   inherit = "all"
#   exclude = ["LD_*", "DYLD_*", "NODE_OPTIONS", "NODE_PATH", "PYTHON*", "BASH_ENV", "ENV", "PERL5LIB", "RUBYOPT", "RUBYLIB"]
# `inherit = "all"` preserves the default KEY/SECRET/TOKEN exclusions; the
# explicit exclude globs add loader/interpreter hardening.
#
# --- Existing-profile users ---
# The legacy opt-in installer's per-user triad_leader profile
# ($CODEX_HOME/triad-codex-dispatch.config.toml) is selected via
# `-p triad-codex-dispatch` only by the separately opted-in legacy shell entry;
# generated wrapper rules stay profile-neutral. The profile does NOT hijack
# global default_permissions. ONLY this machine-wide requirements file sets
# default_permissions globally. If you already manage default_permissions, do
# NOT overwrite it: keep yours, and ensure triad_leader appears in the
# [allowed_permission_profiles] table only if you deliberately keep that legacy
# shell-entry workflow.

default_permissions = "triad_leader"

[allowed_permission_profiles]
triad_leader = true
